<div class="register-container">

  <nav class="navbar">
    <img class="logo-desktop" src="/assets/logo_p6.png" alt="logo" />
  </nav>

  <div class="content">

    <img class="logo-mobile" src="/assets/logo_p6.png" alt="logo" />

    <div class="header-row">
        <button mat-icon-button class="back-button" routerLink="/">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h1>Inscription</h1>
    </div>
   
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Nom d'utilisateur</label>
        <input formControlName="username" type="text" />
        <mat-error *ngIf="form.controls['username'].touched && form.controls['username'].hasError('required')">
          Le nom d'utilisateur est requis
        </mat-error>
        <mat-error *ngIf="form.controls['username'].touched && form.controls['username'].hasError('minlength')">
          3 caractères minimum
        </mat-error>
      </div>

      <div class="field">
        <label>Adresse e-mail</label>
        <input formControlName="email" type="email" />
        <mat-error *ngIf="form.controls['email'].touched && form.controls['email'].hasError('required')">
          L'e-mail est requis
        </mat-error>
        <mat-error *ngIf="form.controls['email'].touched && form.controls['email'].hasError('email')">
          L'e-mail n'est pas valide
        </mat-error>
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <input formControlName="password" type="password" />
        <mat-error *ngIf="form.controls['password'].touched && form.controls['password'].hasError('required')">
          Le mot de passe est requis
        </mat-error>
        <mat-error *ngIf="form.controls['password'].touched && form.controls['password'].hasError('minlength')">
          8 caractères minimum
        </mat-error>
      </div>

      <span class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </span>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        S'inscrire
      </button>

    </form>
  </div>
</div>
